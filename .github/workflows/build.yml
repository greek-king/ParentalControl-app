name: Build ParentalGuard IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install tools
        run: brew install xcodegen ldid

      - name: Generate project
        run: xcodegen generate --spec project.yml

      - name: Build
        run: |
          xcodebuild \
            -project ParentalGuard.xcodeproj \
            -scheme ParentalGuard \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath $RUNNER_TEMP/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build 2>&1 | tee build.log
          grep -q "BUILD SUCCEEDED" build.log && echo "OK" || (cat build.log && exit 1)

      - name: Package IPA
        run: |
          APP=$(find $RUNNER_TEMP/DerivedData -name "ParentalGuard.app" | grep -v simulator | head -1)
          ldid -S "$APP/ParentalGuard"
          mkdir -p $RUNNER_TEMP/Payload
          cp -r "$APP" $RUNNER_TEMP/Payload/ParentalGuard.app
          cd $RUNNER_TEMP && zip -r ParentalGuard.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ParentalGuard-IPA
          path: ${{ runner.temp }}/ParentalGuard.ipa
          retention-days: 30

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: build-log
          path: build.log
